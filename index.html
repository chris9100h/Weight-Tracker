<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weight Tracker</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #f5f5f5; font-family: system-ui, sans-serif; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #141414; } ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const SUPABASE_URL = "https://lzhkbbwcjfsvpkpmcwdu.supabase.co";
const SUPABASE_KEY = "sb_publishable_XJ4T6c5ARL7Jn9OFfZ42jg_CdMFOBuY";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ORANGE = "#f97316";
const TREND_COLOR = "#facc15";
const BG = "#0a0a0a";
const SURFACE = "#141414";
const SURFACE2 = "#1e1e1e";
const BORDER = "#2a2a2a";
const TEXT = "#f5f5f5";
const TEXT2 = "#a3a3a3";
const STORAGE_KEY = "weight_entries_v1";

function genId() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}
function loadEntries() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; }
}
function saveLocal(e) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(e)); } catch {}
}
const today = () => new Date().toISOString().slice(0, 10);

async function fetchFromSupabase() {
  const { data, error } = await sb.from("weight_entries").select("*").order("date", { ascending: true });
  if (error) throw error;
  return data.map(r => ({ id: r.id, date: r.date, weight: r.weight, note: r.note || "" }));
}
async function upsertEntry(entry) {
  const { error } = await sb.from("weight_entries").upsert({ id: entry.id, date: entry.date, weight: entry.weight, note: entry.note || "" });
  if (error) throw error;
}
async function updateNote(id, note) {
  const { error } = await sb.from("weight_entries").update({ note }).eq("id", id);
  if (error) throw error;
}
async function deleteFromSupabase(id) {
  const { error } = await sb.from("weight_entries").delete().eq("id", id);
  if (error) throw error;
}

function parseCSVDate(raw) {
  raw = raw.trim().replace(/^"|"$/g, "");
  const m = raw.match(/^(\d{1,2})\.(\d{1,2})\.(\d{2,4})$/);
  if (m) { let y=parseInt(m[3]); if(y<100)y+=2000; return `${y}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`; }
  if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
  const m2 = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (m2) { let y=parseInt(m2[3]); if(y<100)y+=2000; return `${y}-${m2[1].padStart(2,"0")}-${m2[2].padStart(2,"0")}`; }
  return null;
}
function parseCSVWeight(raw) {
  const v = parseFloat(raw.trim().replace(/^"|"$/g,"").replace(",","."));
  return isNaN(v) ? null : v;
}
function parseCSV(text) {
  const firstLine = text.split(/\r?\n/)[0];
  const delim = (firstLine.split(";").length > firstLine.split(",").length) ? ";" : ",";
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return { rows: [], errors: [] };
  const rows = [], errors = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim(); if (!line) continue;
    const cols = []; let cur = "", inQ = false;
    for (const c of line) { if(c==='"'){inQ=!inQ;}else if(c===delim&&!inQ){cols.push(cur);cur="";}else cur+=c; }
    cols.push(cur);
    if (cols.length < 2) { errors.push(`Row ${i+1}: too few columns`); continue; }
    const date = parseCSVDate(cols[0]), weight = parseCSVWeight(cols[1]);
    if (!date) { errors.push(`Row ${i+1}: unrecognized date ("${cols[0]}")`); continue; }
    if (weight === null) { errors.push(`Row ${i+1}: invalid weight ("${cols[1]}")`); continue; }
    rows.push({ date, weight, note: cols[2] ? cols[2].trim().replace(/^"|"$/g,"") : "" });
  }
  return { rows, errors };
}
function calcTrend(entries, endIdx) {
  const win = entries.slice(Math.max(0,endIdx-6),endIdx+1);
  if (win.length < 2) return null;
  const n=win.length, xs=win.map((_,i)=>i), ys=win.map(e=>e.weight);
  const mx=xs.reduce((a,b)=>a+b,0)/n, my=ys.reduce((a,b)=>a+b,0)/n;
  const slope=xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my),0)/xs.reduce((s,x)=>s+(x-mx)**2,0);
  return my+slope*(n-1-(n-1)/2);
}

function App() {
  const [entries, setEntries] = useState(loadEntries);
  const [syncing, setSyncing] = useState(false);
  const [syncError, setSyncError] = useState(null);
  const [form, setForm] = useState({ date: today(), weight: "", note: "" });
  const [filterMode, setFilterMode] = useState("3M");
  const [customFrom, setCustomFrom] = useState("");
  const [customTo, setCustomTo] = useState(today());
  const [tooltip, setTooltip] = useState(null);
  const [editId, setEditId] = useState(null);
  const [noteEditId, setNoteEditId] = useState(null);
  const [noteEditVal, setNoteEditVal] = useState("");
  const [importModal, setImportModal] = useState(false);
  const [importResult, setImportResult] = useState(null);
  const [importMode, setImportMode] = useState("merge");
  const [importRows, setImportRows] = useState([]);
  const [importErrors, setImportErrors] = useState([]);
  const [exportModal, setExportModal] = useState(false);
  const [exportCopied, setExportCopied] = useState(false);
  const svgRef = useRef(null);
  const fileRef = useRef(null);

  useEffect(() => {
    setSyncing(true);
    fetchFromSupabase()
      .then(data => { setEntries(data); saveLocal(data); setSyncError(null); })
      .catch(() => setSyncError("Offline — showing local data"))
      .finally(() => setSyncing(false));
  }, []);

  const sorted = useMemo(() => [...entries].sort((a,b)=>a.date.localeCompare(b.date)), [entries]);

  const filtered = useMemo(() => {
    const now = new Date(); let from, to;
    if (filterMode==="custom") {
      from = customFrom ? new Date(customFrom) : new Date(0);
      to = customTo ? new Date(customTo) : now;
    } else {
      to = now;
      const months = filterMode==="1M"?1:filterMode==="3M"?3:filterMode==="6M"?6:null;
      from = months ? new Date(new Date().setMonth(now.getMonth()-months)) : new Date(0);
    }
    return sorted.filter(e=>{ const d=new Date(e.date); return d>=from&&d<=to; });
  }, [sorted, filterMode, customFrom, customTo]);

  const stats = useMemo(() => {
    if (!filtered.length) return null;
    const first=filtered[0].weight, last=filtered[filtered.length-1].weight, diff=+(last-first).toFixed(1);
    return { first, last, diff, min:Math.min(...filtered.map(e=>e.weight)), max:Math.max(...filtered.map(e=>e.weight)), count:filtered.length };
  }, [filtered]);

  const trendData = useMemo(() => filtered.map((_,i)=>calcTrend(filtered,i)), [filtered]);

  async function addEntry() {
    if (!form.date||!form.weight) return;
    const w=parseFloat(form.weight); if(isNaN(w)) return;
    const entry = editId
      ? { id: editId, date: form.date, weight: w, note: form.note }
      : { id: genId(), date: form.date, weight: w, note: form.note };
    try {
      await upsertEntry(entry);
      if (editId) { setEntries(prev=>prev.map(e=>e.id===editId?entry:e)); setEditId(null); }
      else { setEntries(prev=>[...prev, entry]); }
      setForm({date:today(),weight:"",note:""});
    } catch(err) { alert("Failed to save: " + err.message); }
  }

  async function deleteEntry(id) {
    try { await deleteFromSupabase(id); setEntries(prev=>prev.filter(e=>e.id!==id)); }
    catch(err) { alert("Failed to delete: " + err.message); }
  }

  function startEdit(e) { setEditId(e.id); setForm({date:e.date,weight:String(e.weight),note:e.note||""}); }
  function cancelEdit() { setEditId(null); setForm({date:today(),weight:"",note:""}); }
  function startNoteEdit(e) { setNoteEditId(e.id); setNoteEditVal(e.note||""); }

  async function saveNote(id) {
    try {
      await updateNote(id, noteEditVal);
      setEntries(prev=>prev.map(e=>e.id===id?{...e,note:noteEditVal}:e));
    } catch(err) { alert("Failed to save note: " + err.message); }
    setNoteEditId(null);
  }

  function getCSV() {
    const header = "Date,Weight (kg),Note";
    const rows = sorted.map(e=>`${e.date},${e.weight},"${(e.note||"").replace(/"/g,'""')}"`);
    return header+"\n"+rows.join("\n");
  }
  function openExport() { setExportCopied(false); setExportModal(true); }
  function copyCSV() {
    navigator.clipboard.writeText(getCSV()).then(()=>{ setExportCopied(true); setTimeout(()=>setExportCopied(false),2000); });
  }
  function downloadCSV() {
    const a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(getCSV());
    a.download = "weight_data.csv"; a.click();
  }

  function handleFileChange(e) {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{ const {rows,errors}=parseCSV(ev.target.result); setImportRows(rows); setImportErrors(errors); setImportResult(null); };
    reader.readAsText(file,"UTF-8"); e.target.value="";
  }

  async function doImport() {
    if (!importRows.length) return;
    let added=0, skipped=0, updated=0;
    const next = importMode==="replace" ? [] : [...entries];
    if (importMode==="replace") {
      for (const e of entries) await deleteFromSupabase(e.id);
    }
    for (const row of importRows) {
      const ex = next.find(e=>e.date===row.date);
      if (ex) {
        if (importMode==="merge") { skipped++; continue; }
        Object.assign(ex, {weight:row.weight, note:row.note}); updated++;
        await upsertEntry(ex);
      } else {
        const entry = {id: genId(), ...row};
        next.push(entry); added++;
        await upsertEntry(entry);
      }
    }
    setEntries(next);
    setImportResult({added,skipped,updated});
    setImportRows([]); setImportErrors([]);
  }

  const W=700,H=280,PL=52,PR=20,PT=20,PB=40;
  const chartW=W-PL-PR, chartH=H-PT-PB;

  const chart = useMemo(()=>{
    if (!filtered.length) return null;
    const allVals=[...filtered.map(e=>e.weight),...trendData.filter(Boolean)];
    const minW=Math.min(...allVals),maxW=Math.max(...allVals);
    const pad=Math.max((maxW-minW)*0.15,0.5),yMin=minW-pad,yMax=maxW+pad;
    const xScale=i=>filtered.length===1?PL+chartW/2:PL+(i/(filtered.length-1))*chartW;
    const yScale=v=>PT+chartH-((v-yMin)/(yMax-yMin))*chartH;
    return {xScale,yScale,yMin,yMax};
  }, [filtered,trendData,chartW,chartH]);

  function svgMouseMove(e) {
    if (!chart||!filtered.length||!svgRef.current) return;
    const rect=svgRef.current.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*(W/rect.width)-PL;
    let best=0,bestD=Infinity;
    filtered.forEach((_,i)=>{ const d=Math.abs(chart.xScale(i)-PL-mx); if(d<bestD){bestD=d;best=i;} });
    if(bestD<30) setTooltip({i:best,x:chart.xScale(best),y:chart.yScale(filtered[best].weight)});
    else setTooltip(null);
  }

  const linePath = chart&&filtered.length>1?"M"+filtered.map((e,i)=>`${chart.xScale(i)},${chart.yScale(e.weight)}`).join("L"):null;
  const trendPath = chart&&trendData.length>1?"M"+trendData.map((v,i)=>v!=null?`${chart.xScale(i)},${chart.yScale(v)}`:null).filter(Boolean).join("L"):null;
  const yTicks = chart?Array.from({length:5},(_,i)=>chart.yMin+(i/4)*(chart.yMax-chart.yMin)):[];
  const xTicks = chart?filtered.filter((_,i)=>{ const step=Math.max(1,Math.ceil(filtered.length/6)); return i%step===0||i===filtered.length-1; }).map(e=>({date:e.date,i:filtered.indexOf(e)})):[];

  const inp={background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:"6px",color:TEXT,padding:"7px 10px",fontSize:"13px",outline:"none",width:"100%",boxSizing:"border-box"};
  const btn=(bg,col,extra={})=>({background:bg,color:col,border:bg==="none"?"none":`1px solid ${bg===SURFACE2?BORDER:bg}`,borderRadius:"6px",padding:"7px 13px",fontSize:"13px",cursor:"pointer",fontWeight:bg===ORANGE?500:400,...extra});
  const sectionHeader=(label)=>(
    <div style={{padding:"10px 14px",borderBottom:`1px solid ${BORDER}`,fontSize:"12px",color:TEXT2,fontWeight:500}}>{label}</div>
  );
  const notedInRange = filtered.filter(e=>e.note);

  return (
    <div style={{background:BG,minHeight:"100vh",color:TEXT,fontFamily:"system-ui,sans-serif",padding:"20px 16px",maxWidth:"900px",margin:"0 auto"}}>

      {exportModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:99,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>
          <div style={{background:"#111",border:`1px solid ${BORDER}`,borderRadius:"12px",padding:"20px",width:"100%",maxWidth:"520px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
              <span style={{fontWeight:500,fontSize:"15px"}}>Export CSV</span>
              <button onClick={()=>setExportModal(false)} style={btn("none",TEXT2)}>✕</button>
            </div>
            <textarea readOnly value={getCSV()} style={{...inp,height:"180px",resize:"none",fontFamily:"monospace",fontSize:"11px",lineHeight:1.5}} onClick={e=>e.target.select()}/>
            <div style={{display:"flex",gap:"8px",marginTop:"10px"}}>
              <button onClick={copyCSV} style={{...btn(exportCopied?"#4ade80":SURFACE2,exportCopied?"#000":TEXT),flex:1}}>
                {exportCopied?"✓ Copied!":"Copy to clipboard"}
              </button>
              <button onClick={downloadCSV} style={{...btn(ORANGE,"#000"),flex:1}}>Download .csv</button>
            </div>
          </div>
        </div>
      )}

      {importModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:99,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>
          <div style={{background:"#111",border:`1px solid ${BORDER}`,borderRadius:"12px",padding:"20px",width:"100%",maxWidth:"480px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
              <span style={{fontWeight:500,fontSize:"15px"}}>Import CSV</span>
              <button onClick={()=>{setImportModal(false);setImportRows([]);setImportErrors([]);setImportResult(null);}} style={btn("none",TEXT2)}>✕</button>
            </div>
            <div style={{fontSize:"12px",color:TEXT2,marginBottom:"8px"}}>Expected format: <code style={{color:ORANGE}}>Date,Weight</code> (e.g. <code style={{color:TEXT2}}>09.01.26,"84,2"</code>)</div>
            <input ref={fileRef} type="file" accept=".csv,text/csv" onChange={handleFileChange} style={{display:"none"}}/>
            <button onClick={()=>fileRef.current.click()} style={{...btn(SURFACE2,TEXT),marginBottom:"12px",width:"100%"}}>Select file</button>
            {importRows.length>0&&(
              <>
                <div style={{fontSize:"12px",color:"#4ade80",marginBottom:"8px"}}>{importRows.length} rows detected</div>
                <div style={{maxHeight:"120px",overflowY:"auto",background:SURFACE2,borderRadius:"6px",padding:"6px 10px",marginBottom:"10px"}}>
                  {importRows.slice(0,8).map((r,i)=>(
                    <div key={i} style={{fontSize:"12px",color:TEXT2,padding:"2px 0"}}>{r.date} — {r.weight} kg{r.note?` — ${r.note}`:""}</div>
                  ))}
                  {importRows.length>8&&<div style={{fontSize:"12px",color:TEXT2}}>… and {importRows.length-8} more</div>}
                </div>
                <div style={{marginBottom:"10px"}}>
                  <div style={{fontSize:"11px",color:TEXT2,marginBottom:"5px"}}>On duplicate dates:</div>
                  <div style={{display:"flex",gap:"6px"}}>
                    {[["merge","Skip"],["overwrite","Overwrite"],["replace","Replace all"]].map(([v,l])=>(
                      <button key={v} onClick={()=>setImportMode(v)} style={{...btn(importMode===v?ORANGE:SURFACE2,importMode===v?"#000":TEXT2),fontSize:"12px",padding:"5px 10px"}}>{l}</button>
                    ))}
                  </div>
                </div>
                <button onClick={doImport} style={{...btn(ORANGE,"#000"),width:"100%"}}>Import</button>
              </>
            )}
            {importErrors.length>0&&<div style={{marginTop:"8px"}}>{importErrors.map((e,i)=><div key={i} style={{fontSize:"11px",color:"#f87171"}}>{e}</div>)}</div>}
            {importResult&&<div style={{marginTop:"10px",fontSize:"13px",color:"#4ade80"}}>✓ {importResult.added} added{importResult.updated?`, ${importResult.updated} updated`:""}{importResult.skipped?`, ${importResult.skipped} skipped`:""}</div>}
          </div>
        </div>
      )}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"18px"}}>
        <h2 style={{margin:0,fontSize:"18px",fontWeight:500,color:ORANGE}}>Weight tracker</h2>
        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
          {syncing&&<span style={{fontSize:"11px",color:TEXT2}}>Syncing…</span>}
          {syncError&&<span style={{fontSize:"11px",color:"#f87171"}}>{syncError}</span>}
          <button onClick={openExport} style={{...btn(SURFACE2,TEXT2),fontSize:"12px"}}>Export CSV</button>
          <button onClick={()=>setImportModal(true)} style={{...btn(SURFACE2,TEXT2),fontSize:"12px"}}>Import CSV</button>
        </div>
      </div>

      {stats&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:"8px",marginBottom:"16px"}}>
          {[
            {label:"Start",val:stats.first.toFixed(1)+" kg"},
            {label:"Current",val:stats.last.toFixed(1)+" kg"},
            {label:"Change",val:(stats.diff>0?"+":"")+stats.diff+" kg",color:stats.diff>0?"#f87171":stats.diff<0?"#4ade80":TEXT2},
            {label:"Minimum",val:stats.min.toFixed(1)+" kg"},
            {label:"Maximum",val:stats.max.toFixed(1)+" kg"},
            {label:"Entries",val:stats.count},
          ].map(s=>(
            <div key={s.label} style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:"8px",padding:"10px 12px"}}>
              <div style={{fontSize:"11px",color:TEXT2,marginBottom:"3px"}}>{s.label}</div>
              <div style={{fontSize:"17px",fontWeight:500,color:s.color||TEXT}}>{s.val}</div>
            </div>
          ))}
        </div>
      )}

      <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"14px",alignItems:"center"}}>
        {["1M","3M","6M","All","custom"].map(m=>(
          <button key={m} onClick={()=>setFilterMode(m)} style={{background:filterMode===m?ORANGE:SURFACE2,color:filterMode===m?"#000":TEXT2,border:`1px solid ${filterMode===m?ORANGE:BORDER}`,borderRadius:"6px",padding:"5px 11px",fontSize:"12px",cursor:"pointer",fontWeight:filterMode===m?500:400}}>
            {m==="custom"?"Custom":m}
          </button>
        ))}
        {filterMode==="custom"&&(
          <>
            <input type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)} style={{...inp,width:"130px"}}/>
            <span style={{color:TEXT2,fontSize:"12px"}}>to</span>
            <input type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)} style={{...inp,width:"130px"}}/>
          </>
        )}
      </div>

      <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:"10px",padding:"12px 8px 8px",marginBottom:"16px"}}>
        {!filtered.length?(
          <div style={{height:H+"px",display:"flex",alignItems:"center",justifyContent:"center",color:TEXT2,fontSize:"13px"}}>No data in selected range</div>
        ):(
          <>
            <div style={{display:"flex",gap:"16px",fontSize:"11px",color:TEXT2,marginBottom:"6px",paddingLeft:PL+"px"}}>
              <span style={{display:"flex",alignItems:"center",gap:"4px"}}><span style={{width:"18px",height:"2px",background:ORANGE,display:"inline-block"}}></span>Weight</span>
              <span style={{display:"flex",alignItems:"center",gap:"4px"}}><span style={{width:"18px",height:0,borderTop:`2px dashed ${TREND_COLOR}`,display:"inline-block"}}></span>7-day trend</span>
              <span style={{display:"flex",alignItems:"center",gap:"4px"}}><span style={{width:"1px",height:"12px",borderLeft:"1px dashed #b45309",display:"inline-block"}}></span>Note</span>
            </div>
            <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block",cursor:"crosshair"}} onMouseMove={svgMouseMove} onMouseLeave={()=>setTooltip(null)}>
              {yTicks.map((v,i)=>(
                <g key={i}>
                  <line x1={PL} x2={W-PR} y1={chart.yScale(v)} y2={chart.yScale(v)} stroke={BORDER} strokeWidth={0.5}/>
                  <text x={PL-5} y={chart.yScale(v)+4} textAnchor="end" fontSize={10} fill={TEXT2}>{v.toFixed(1)}</text>
                </g>
              ))}
              {xTicks.map(({date,i})=>(
                <text key={date} x={chart.xScale(i)} y={H-6} textAnchor="middle" fontSize={10} fill={TEXT2}>{date.slice(5)}</text>
              ))}
              {linePath&&filtered.length>1&&(
                <path d={linePath+`L${chart.xScale(filtered.length-1)},${PT+chartH}L${chart.xScale(0)},${PT+chartH}Z`} fill={ORANGE} fillOpacity={0.08} stroke="none"/>
              )}
              {linePath&&<path d={linePath} fill="none" stroke={ORANGE} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round"/>}
              {trendPath&&<path d={trendPath} fill="none" stroke={TREND_COLOR} strokeWidth={1.5} strokeDasharray="5,4" strokeLinejoin="round"/>}
              {filtered.map((e,i)=>e.note&&(
                <line key={e.id+"ann"} x1={chart.xScale(i)} x2={chart.xScale(i)} y1={PT} y2={PT+chartH} stroke="#b45309" strokeWidth={1} strokeDasharray="4,3"/>
              ))}
              {filtered.map((e,i)=>(
                <circle key={e.id+"p"} cx={chart.xScale(i)} cy={chart.yScale(e.weight)} r={3} fill={ORANGE} stroke={SURFACE} strokeWidth={1}/>
              ))}
              {tooltip&&(()=>{
                const e=filtered[tooltip.i];
                const tx=Math.min(Math.max(tooltip.x,PL+55),W-PR-55);
                const ty=tooltip.y>PT+chartH/2?tooltip.y-56:tooltip.y+12;
                return(
                  <g>
                    <line x1={tooltip.x} x2={tooltip.x} y1={PT} y2={PT+chartH} stroke={ORANGE} strokeWidth={0.8} strokeDasharray="3,3"/>
                    <circle cx={tooltip.x} cy={tooltip.y} r={5} fill={ORANGE} stroke={SURFACE} strokeWidth={2}/>
                    {(() => {
                      const trend = trendData[tooltip.i];
                      const rows = 2 + (trend!=null?1:0) + (e.note?1:0);
                      const h = 10 + rows*15;
                      let y = ty+14;
                      return <>
                        <rect x={tx-58} y={ty} width={116} height={h} rx={5} fill={SURFACE2} stroke={BORDER}/>
                        <text x={tx} y={y} textAnchor="middle" fontSize={11} fill={TEXT2}>{e.date}</text>
                        <text x={tx} y={y+=15} textAnchor="middle" fontSize={13} fontWeight="500" fill={ORANGE}>{e.weight.toFixed(1)} kg</text>
                        {trend!=null&&<text x={tx} y={y+=15} textAnchor="middle" fontSize={11} fill={TREND_COLOR}>7d avg: {trend.toFixed(1)} kg</text>}
                        {e.note&&<text x={tx} y={y+=15} textAnchor="middle" fontSize={10} fill="#60a5fa">{e.note.slice(0,18)}{e.note.length>18?"…":""}</text>}
                      </>;
                    })()}
                  </g>
                );
              })()}
            </svg>
          </>
        )}
      </div>

      {notedInRange.length>0&&(
        <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:"10px",overflow:"hidden",marginBottom:"16px"}}>
          {sectionHeader("Notes")}
          <div style={{padding:"8px 0"}}>
            {notedInRange.map(e=>(
              <div key={e.id} style={{display:"flex",alignItems:"center",padding:"7px 14px",gap:"12px",borderBottom:`1px solid ${BORDER}`}}>
                <span style={{fontSize:"12px",color:TEXT2,minWidth:"82px"}}>{e.date}</span>
                <span style={{width:"1px",alignSelf:"stretch",borderLeft:"1px dashed #b45309",flexShrink:0}}></span>
                <span style={{fontSize:"13px",color:TEXT,flex:1}}>{e.note}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:"10px",overflow:"hidden",marginBottom:"16px"}}>
        {sectionHeader(editId?"Edit entry":"New entry")}
        <div style={{padding:"14px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 2fr auto",gap:"8px",alignItems:"end"}}>
            <div><div style={{fontSize:"11px",color:TEXT2,marginBottom:"4px"}}>Date</div><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={inp}/></div>
            <div><div style={{fontSize:"11px",color:TEXT2,marginBottom:"4px"}}>Weight (kg)</div><input type="number" step="0.1" placeholder="80.5" value={form.weight} onChange={e=>setForm(f=>({...f,weight:e.target.value}))} style={inp}/></div>
            <div><div style={{fontSize:"11px",color:TEXT2,marginBottom:"4px"}}>Note (optional)</div><input type="text" placeholder="e.g. after workout" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} style={inp}/></div>
            <div style={{display:"flex",gap:"6px"}}>
              <button onClick={addEntry} style={btn(ORANGE,"#000")}>{editId?"Save":"+ Add"}</button>
              {editId&&<button onClick={cancelEdit} style={btn(SURFACE2,TEXT2)}>✕</button>}
            </div>
          </div>
        </div>
      </div>

      {sorted.length>0&&(
        <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:"10px",overflow:"hidden"}}>
          {sectionHeader("All entries")}
          <div style={{maxHeight:"260px",overflowY:"auto"}}>
            {[...sorted].reverse().map(e=>(
              <div key={e.id} style={{borderBottom:`1px solid ${BORDER}`}}>
                <div style={{display:"flex",alignItems:"center",padding:"8px 14px",gap:"10px"}}>
                  <span style={{fontSize:"12px",color:TEXT2,minWidth:"82px"}}>{e.date}</span>
                  <span style={{fontSize:"14px",fontWeight:500,color:ORANGE,minWidth:"56px"}}>{e.weight.toFixed(1)} kg</span>
                  {noteEditId===e.id?(
                    <>
                      <input value={noteEditVal} onChange={ev=>setNoteEditVal(ev.target.value)} onKeyDown={ev=>{if(ev.key==="Enter")saveNote(e.id);if(ev.key==="Escape")setNoteEditId(null);}} autoFocus style={{...inp,flex:1,padding:"4px 8px",fontSize:"12px"}} placeholder="Add a note…"/>
                      <button onClick={()=>saveNote(e.id)} style={{...btn(ORANGE,"#000"),padding:"4px 10px",fontSize:"12px"}}>✓</button>
                      <button onClick={()=>setNoteEditId(null)} style={{...btn(SURFACE2,TEXT2),padding:"4px 8px",fontSize:"12px"}}>✕</button>
                    </>
                  ):(
                    <>
                      <span onClick={()=>startNoteEdit(e)} style={{fontSize:"12px",color:e.note?"#60a5fa":BORDER,flex:1,cursor:"pointer",fontStyle:e.note?"normal":"italic"}}>
                        {e.note||"Add note…"}
                      </span>
                      <button onClick={()=>startEdit(e)} style={{background:"none",border:"none",color:TEXT2,cursor:"pointer",fontSize:"13px",padding:"2px 4px"}}>✏️</button>
                      <button onClick={()=>deleteEntry(e.id)} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:"13px",padding:"2px 4px"}}>✕</button>
                    </>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
